<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <main class="container">
    <article class="card" data-testid="test-todo-card">

      <header class="card-header">
        <input type="checkbox" id="complete" data-testid="test-todo-complete-toggle" />
        <label for="complete" class="checkbox-label">Mark as complete</label>

        <select data-testid="test-todo-status-control" class="status-select">
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Done">Done</option>
        </select>
      </header>

      <div data-testid="test-todo-collapsible-section" class="collapsible-content">
        <h3 data-testid="test-todo-title" class="title">Build Portfolio Website</h3>
        <p data-testid="test-todo-description" class="description">
          Create a modern portfolio using Nuxt and deploy it.
        </p>
      </div>
      <button data-testid="test-todo-expand-toggle" class="btn-text">Show more</button>

      <div class="meta">
        <span data-testid="test-todo-priority" class="badge">High</span>
        <span data-testid="test-todo-status" class="badge status">In Progress</span>
      </div>

      <div class="dates">
        <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00">
          Due April 16, 2026
        </time>
        <p id="time-remaining" data-testid="test-todo-time-remaining" class="time-remaining"></p>
      </div>

      <ul data-testid="test-todo-tags" class="tags">
        <li data-testid="test-todo-tag-work">work</li>
        <li data-testid="test-todo-tag-urgent">urgent</li>
        <li>design</li>
      </ul>

      <div class="actions">
        <button data-testid="test-todo-edit-button" class="btn-edit">Edit</button>
        <button data-testid="test-todo-delete-button" class="btn-delete">Delete</button>
      </div>

      <form data-testid="test-todo-edit-form" class="edit-form hidden">
        <h4>Edit Task</h4>
        <input type="text" data-testid="test-todo-edit-title-input" placeholder="Title" />
        <textarea data-testid="test-todo-edit-description-input" placeholder="Description"></textarea>

        <label>Priority:</label>
        <select data-testid="test-todo-edit-priority-select">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>

        <label>Due Date:</label>
        <input type="datetime-local" data-testid="test-todo-edit-due-date-input" />

        <div class="form-actions">
          <button type="button" data-testid="test-todo-save-button" class="btn-save">Save</button>
          <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
        </div>
      </form>

    </article>
  </main>

  <script src="script.js"></script>
</body>

</html>
